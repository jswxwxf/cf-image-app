name: Deploy to Cloudflare

# 触发条件：全分支推送都会触发，但在步骤中我们会区分生产与预览环境
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

# 部署逻辑
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Project
    
    # 全局环境变量
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # 💥 核心逻辑：如果是 main 分支，变量为 "--env production"，否则为空（即默认预览环境）
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && '--env production' || '' }}

    steps:
      # 1. 下载代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            image-analysis-consumer/package-lock.json

      # 3. 部署 Consumer Worker
      - name: Install Consumer Dependencies
        run: npm ci
        working-directory: image-analysis-consumer

      - name: Deploy Consumer Worker
        run: npm run deploy -- ${{ env.DEPLOY_ENV }}
        working-directory: image-analysis-consumer

      # 4. 部署 Frontend (Next.js)
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      # --- 数据库迁移 (D1) ---
      # 放在部署代码之前，确保数据库结构先准备好
      - name: Run D1 Migrations
        run: npx wrangler d1 migrations apply DB --remote ${{ env.DEPLOY_ENV }} --yes
        working-directory: frontend

      - name: Build and Deploy Frontend
        run: npm run deploy -- ${{ env.DEPLOY_ENV }}
        working-directory: frontend
